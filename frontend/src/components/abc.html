<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indian States and Districts</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    select, button { margin: 10px; padding: 6px; }
    ul { list-style-type: none; padding: 0; }
    li { background: #f2f2f2; margin: 4px 0; padding: 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h2>Indian States and Districts</h2>

  <label for="stateSelect">Select a State:</label>
  <select id="stateSelect">
    <option>Loading states...</option>
  </select>
  
  <button onclick="loadDistricts()">Get Districts</button>

  <h3>Districts:</h3>
  <ul id="districtList"></ul>

  <script>
    const stateSelect = document.getElementById("stateSelect");
    const districtList = document.getElementById("districtList");

    // Load all states from REST India API
    fetch("https://restindia.herokuapp.com/state/all")
      .then(response => response.json())
      .then(data => {
        stateSelect.innerHTML = "";
        data.forEach(state => {
          const option = document.createElement("option");
          option.value = state.name;
          option.textContent = state.name;
          stateSelect.appendChild(option);
        });
      })
      .catch(err => {
        console.error("Error fetching states:", err);
      });

    // Fetch districts of selected state
    function loadDistricts() {
      const selectedState = stateSelect.value;
      districtList.innerHTML = "<li>Loading...</li>";

      fetch(`https://restindia.herokuapp.com/${encodeURIComponent(selectedState)}/all`)
        .then(res => res.json())
        .then(data => {
          districtList.innerHTML = "";
          data.forEach(district => {
            const li = document.createElement("li");
            li.textContent = district.name;
            districtList.appendChild(li);
          });
        })
        .catch(err => {
          console.error("Error fetching districts:", err);
          districtList.innerHTML = "<li>Error loading districts</li>";
        });
    }
  </script>
</body>
</html>
