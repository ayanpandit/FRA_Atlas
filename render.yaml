# Render services manifest for FRA_Atlas
# This defines three services:
#  - static site for frontend (Vite build output)
#  - web service for map API (Flask)
#  - web service for OCR API (Flask)

services:
  - type: static
    name: fra-atlas-frontend
    env: static
    branch: main
    root: frontend
    buildCommand: "npm install && npm run build"
    publishPath: dist

  - type: web_service
    name: fra-atlas-backend
    env: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    buildContext: backend
    healthCheckPath: /health
    plan: starter
