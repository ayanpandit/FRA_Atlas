<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRA NDVI/NDWI Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">

<div class="max-w-5xl mx-auto bg-white shadow p-6 rounded-lg">
  <h1 class="text-3xl font-bold mb-6 text-center">FRA NDVI/NDWI Analyzer</h1>

  <!-- Address Input -->
  <div class="mb-6">
    <label class="block font-medium mb-1">Enter Address:</label>
    <input id="address-input" type="text" placeholder="Type address..." 
           class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <ul id="suggestions" class="border rounded mt-1 bg-white hidden max-h-40 overflow-auto"></ul>
  </div>

  <button id="submit-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-full mb-6">
    Analyze
  </button>

  <div id="output" class="space-y-6 hidden">
    <div class="bg-gray-50 p-4 rounded shadow">
      <p><strong>Selected Address:</strong> <span id="selected-address"></span></p>
      <p><strong>Coordinates:</strong> <span id="selected-coords"></span></p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div><h3 class="text-center font-semibold mb-2">NDVI</h3><img id="ndvi-img" class="w-full border rounded" src="" alt="NDVI"></div>
      <div><h3 class="text-center font-semibold mb-2">NDWI</h3><img id="ndwi-img" class="w-full border rounded" src="" alt="NDWI"></div>
      <div><h3 class="text-center font-semibold mb-2">RGB</h3><img id="rgb-img" class="w-full border rounded" src="" alt="RGB"></div>
    </div>

    <div class="bg-gray-50 p-4 rounded shadow">
      <h2 class="text-xl font-semibold mb-2">NDVI Statistics</h2>
      <p>Mean: <span id="ndvi-mean"></span>, Min: <span id="ndvi-min"></span>, Max: <span id="ndvi-max"></span></p>
      <p>Vegetation Coverage: Dense: <span id="veg-dense"></span>%, Sparse: <span id="veg-sparse"></span>%, Bare: <span id="veg-bare"></span>%</p>

      <h2 class="text-xl font-semibold mt-4 mb-2">NDWI Statistics</h2>
      <p>Mean: <span id="ndwi-mean"></span>, Min: <span id="ndwi-min"></span>, Max: <span id="ndwi-max"></span></p>
      <p>Water Coverage: Water: <span id="water-area"></span>%, Dry: <span id="dry-area"></span>%</p>
    </div>
  </div>
</div>

<script>
const OPEN_CAGE_KEY = "d8a8e3ad6f6c4edcad27908755a7578b";
const addressInput = document.getElementById('address-input');
const suggestionsEl = document.getElementById('suggestions');
let selectedPlace = null;

// Autocomplete
addressInput.addEventListener('input', async () => {
  const query = addressInput.value;
  if (!query) { suggestionsEl.innerHTML=''; suggestionsEl.classList.add('hidden'); return; }
  try {
    const res = await fetch(`https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(query)}&key=${OPEN_CAGE_KEY}&limit=5&countrycode=in`);
    const data = await res.json();
    const results = data.results || [];
    suggestionsEl.innerHTML = '';
    results.forEach((r) => {
      const li = document.createElement('li');
      li.textContent = r.formatted;
      li.className = "px-2 py-1 hover:bg-blue-100 cursor-pointer";
      li.addEventListener('click', () => {
        selectedPlace = r;
        addressInput.value = r.formatted;
        suggestionsEl.classList.add('hidden');
      });
      suggestionsEl.appendChild(li);
    });
    suggestionsEl.classList.toggle('hidden', results.length === 0);
  } catch(err){ console.error(err); }
});

// Submit
document.getElementById('submit-btn').addEventListener('click', async () => {
  if (!selectedPlace) { alert("Select suggestion from list!"); return; }
  document.getElementById('selected-address').textContent = selectedPlace.formatted;
  document.getElementById('selected-coords').textContent = `${selectedPlace.geometry.lat}, ${selectedPlace.geometry.lng}`;
  document.getElementById('output').classList.remove('hidden');

  try {
    const res = await fetch('http://127.0.0.1:5000/process', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({address:selectedPlace.formatted})
    });
    const data = await res.json();
    if(data.error){ alert("Error: "+data.error); return; }

    document.getElementById('ndvi-img').src = data.images.ndvi;
    document.getElementById('ndwi-img').src = data.images.ndwi;
    document.getElementById('rgb-img').src  = data.images.rgb;

    document.getElementById('ndvi-mean').textContent = data.stats.ndvi.NDVI_mean.toFixed(2);
    document.getElementById('ndvi-min').textContent = data.stats.ndvi.NDVI_min.toFixed(2);
    document.getElementById('ndvi-max').textContent = data.stats.ndvi.NDVI_max.toFixed(2);
    document.getElementById('veg-dense').textContent = data.stats.veg_coverage.dense;
    document.getElementById('veg-sparse').textContent = data.stats.veg_coverage.sparse;
    document.getElementById('veg-bare').textContent = data.stats.veg_coverage.bare;

    document.getElementById('ndwi-mean').textContent = data.stats.ndwi.NDWI_mean.toFixed(2);
    document.getElementById('ndwi-min').textContent = data.stats.ndwi.NDWI_min.toFixed(2);
    document.getElementById('ndwi-max').textContent = data.stats.ndwi.NDWI_max.toFixed(2);
    document.getElementById('water-area').textContent = data.stats.water_coverage.water;
    document.getElementById('dry-area').textContent = data.stats.water_coverage.dry;

  } catch(err){ console.error(err); alert("Failed to fetch data from backend."); }
});
</script>

</body>
</html>
